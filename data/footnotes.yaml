    content: "“If we devalue the heart, we also devalue what it means to speak from the heart, to act with the heart, to cultivate and heal the heart. If we fail to appreciate the specificity of the heart, we miss the messages that the mind alone cannot communicate; we miss out on the richness of our encounters with others; we miss out on poetry. We also lose track of history and our own past, since our real personal history is built with the heart. At the end of our lives, that alone will matter.” Francis, Encyclical Letter [*Dilexit Nos*](https://www.vatican.va/content/francesco/en/encyclicals/documents/20241024-enciclica-dilexit-nos.html) (24 October 2024), 11: *AAS* 116 (2024), 1372."
