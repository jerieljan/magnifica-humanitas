  - id: 160
    content: "As in the Papal Bulls *Sicut Dudum* (13 January 1435) and *Etsi Suscepti* (9 January 1442) of Eugenius IV, and in the Papal Bulls *Dum Diversas* (18 June 1452) and *Romanus Pontifex* (8 January 1455) of Nicholas V. Political and, at times, even economic needs overcame the demands of the Gospel. The need for evangelization was frequently compromised or at least misunderstood with regard to the needs of worldly powers, thus relativizing the problematic incompatibility of slavery with the Christian conscience."
  - id: 161
